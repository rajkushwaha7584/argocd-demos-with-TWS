apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-shop-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/rajkushwaha7584/argocd-demos-with-TWS.git   # Replace it with your forked repo
    targetRevision: main
    path: declarative_approach/online_shop
  destination:
    server: http://kubernetes.default.svc   # Replace with your Cluster Url, To get run: `argocd cluster list`
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
